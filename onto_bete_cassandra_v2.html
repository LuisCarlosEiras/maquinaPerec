const ANALYSIS=`
<h3>Análise das Ligações Principais</h3>

<h4>Bete como nó hiperconectado</h4>
<p>Com 11 conexões de saída e 3 de entrada, <strong>Bete</strong> é o nó de maior grau absoluto do grafo — não por acaso, pois o texto inteiro é uma tentativa coletiva e fracassada de defini-la. Cada aresta que parte de Bete aponta para uma dimensão diferente de sua existência: ela encarna Cassandra, foge, cria, sofre a profecia ignorada, habita espaços, cataloga amantes e culmina em morte. O grafo torna visível o que o conto afirma: Bete é mais do que qualquer categoria pode conter.</p>

<h4>A ligação central: Bete → Cassandra → Profecia Ignorada</h4>
<p>A cadeia <strong>Bete → encarna → Cassandra → gera → Profecia Ignorada → ecoa → Memória e Repetição</strong> é a espinha dorsal filosófica do conto. A maldição de Cassandra não é apenas mitológica — é a condição de Bete no mundo real: sua beleza e magia invisíveis, seu talento não reconhecido, suas verdades não acreditadas. O conto repete essa estrutura em cada ato, como a Direção anuncia no início: a repetição é necessária à memória e à verdade.</p>

<h4>Morte de Bete → confunde-se com → Cassandra</h4>
<p>A aresta mais perturbadora do grafo: no final, o jornal noticia que no desastre em que Bete morreu, <strong>Cassandra</strong> foi a única sobrevivente. A fusão das duas identidades, anunciada durante todo o conto, se consuma na morte — a profecia de Cassandra era a morte de Bete, e ninguém acreditou. Este nó de chegada transforma toda a obra numa elegia retroativa.</p>

<h4>Teatro como mediador universal</h4>
<p>O nó <strong>Teatro</strong> conecta Bete, a Mitologia Grega, a Metalinguagem e o espaço físico do Francisco Nunes. Ele não é apenas cenário — é a condição de possibilidade de toda a obra. O conto se declara explicitamente peça, filme e roteiro; o teatro não está dentro da história, é a forma da história.</p>

<h4>Ditadura como pano de fundo silencioso</h4>
<p>O nó <strong>Ditadura 1968</strong> tem apenas três conexões, mas sua posição é estratégica: ameaça a Liberdade, provoca a Fuga e liga-se ao pai alemão suspeito de crimes de guerra. A tortura e a morte ocorrem "na sala ao lado" enquanto os jovens ensaiam — a repressão não interrompe o espetáculo; ela é o contexto que o torna urgente.</p>

<ul>
  <li><strong>Bete → Teatro → Metalinguagem</strong>: a atriz que é também a forma narrativa</li>
  <li><strong>Fuga → Liberdade → Repressão</strong>: a liberdade como movimento forçado pelo cerco</li>
  <li><strong>Memória e Repetição → Profecia Ignorada → Morte</strong>: a estrutura trágica em loop</li>
  <li><strong>Cassandra (mito) → inspira → Teatro → alimenta → Metalinguagem</strong>: do Olimpo à tela do papel</li>
  <li><strong>Morte de Bete ↔ Cassandra</strong>: a única aresta bidirecional — e a mais letal</li>
</ul>
`;

// ── Canvas init ──
function initCanvas(){
  const wrap=document.getElementById('graph-wrap');
  const W=wrap.getBoundingClientRect().width||740;
  const H=540;
  gc.style.width=W+'px'; gc.style.height=H+'px';
  gc.width=W*DPR; gc.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  return{W,H};
}

function buildGraph(){
  const{W,H}=initCanvas();
  const cx=W/2, cy=H/2, total=ONTO.nodes.length;
  nodes=ONTO.nodes.map((n,i)=>{
    let x,y;
    if(i===0){x=cx;y=cy;}
    else if(i<8){const a=((i-1)/7)*Math.PI*2-Math.PI/2; x=cx+120*Math.cos(a); y=cy+120*Math.sin(a);}
    else{const idx=i-8,cnt=total-8; const a=(idx/cnt)*Math.PI*2-Math.PI/3; x=cx+215*Math.cos(a); y=cy+215*Math.sin(a);}
    return{...n, x:x+(Math.random()-.5)*10, y:y+(Math.random()-.5)*10, vx:0, vy:0, rad:i===0?42:i<8?33:27};
  });
  edges=ONTO.edges.filter(e=>nodes.find(n=>n.id===e.source)&&nodes.find(n=>n.id===e.target));
  buildLegend();
  setupEvents();
  if(animId)cancelAnimationFrame(animId);
  simulate(0);
  document.getElementById('analysis').innerHTML=ANALYSIS;
}

function buildLegend(){
  const used=[...new Set(nodes.map(n=>n.type))];
  document.getElementById('legend').innerHTML=used.map(t=>
    `<div class="li"><div class="ld" style="background:${COLORS[t]||'#888'}"></div>${LABELS[t]||t}</div>`
  ).join('');
}

// ── Simulação de forças ──
function simulate(iter){
  const W=gc.width/DPR, H=gc.height/DPR;
  nodes.forEach(n=>{n.vx*=.78; n.vy*=.78;});
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    const minD=(a.rad+b.rad)*1.42;
    const f=d<minD?(minD-d)*.62:3500/(d*d);
    a.vx-=f*dx/d; a.vy-=f*dy/d; b.vx+=f*dx/d; b.vy+=f*dy/d;
  }
  edges.forEach(e=>{
    const a=nodes.find(n=>n.id===e.source), b=nodes.find(n=>n.id===e.target);
    if(!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    const ideal=(a.id==='n0'||b.id==='n0')?140:165;
    const f=(d-ideal)*.026;
    a.vx+=f*dx/d; a.vy+=f*dy/d; b.vx-=f*dx/d; b.vy-=f*dy/d;
  });
  nodes.forEach(n=>{n.vx+=(W/2-n.x)*.004; n.vy+=(H/2-n.y)*.004;});
  nodes.forEach(n=>{
    if(n===drag) return;
    n.x+=n.vx; n.y+=n.vy;
    n.x=Math.max(n.rad+4,Math.min(W-n.rad-4,n.x));
    n.y=Math.max(n.rad+4,Math.min(H-n.rad-4,n.y));
  });
  draw();
  if(iter<370) animId=requestAnimationFrame(()=>simulate(iter+1));
}

// ── Helpers de curva ──
function qp(p0,p1,p2,t){return(1-t)*(1-t)*p0+2*(1-t)*t*p1+t*t*p2}
function qd(p0,p1,p2,t){return 2*(1-t)*(p1-p0)+2*t*(p2-p1)}

// Seta sólida preenchida
function drawArrow(x,y,ang,sz,col){
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(-sz,-sz*.42); ctx.lineTo(-sz*.22,0); ctx.lineTo(-sz,sz*.42);
  ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  ctx.restore();
}

// Texto com fundo retangular (pill) — garante legibilidade em qualquer fundo
function fillTextBg(text, x, y, font, textColor, bgColor, padX, padY){
  ctx.font=font;
  const tw=ctx.measureText(text).width;
  const bx=x-tw/2-padX, by=y-10-padY;
  const bw=tw+padX*2, bh=13+padY*2;
  ctx.fillStyle=bgColor;
  // pill arredondado
  const r=4;
  ctx.beginPath();
  ctx.moveTo(bx+r,by); ctx.lineTo(bx+bw-r,by);
  ctx.arcTo(bx+bw,by,bx+bw,by+r,r);
  ctx.lineTo(bx+bw,by+bh-r);
  ctx.arcTo(bx+bw,by+bh,bx+bw-r,by+bh,r);
  ctx.lineTo(bx+r,by+bh);
  ctx.arcTo(bx,by+bh,bx,by+bh-r,r);
  ctx.lineTo(bx,by+r);
  ctx.arcTo(bx,by,bx+r,by,r);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle=textColor;
  ctx.fillText(text,x,y);
}

// Texto multilinha dentro do círculo com fundo garantido
function wrapText(lbl,maxW){
  const words=(lbl||'').replace('\n',' ').split(' ');
  const lines=[]; let line='';
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}
    else line=t;
  }
  if(line)lines.push(line);
  return lines;
}

// ── Draw principal ──
function draw(){
  const W=gc.width/DPR, H=gc.height/DPR;
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(tr.x,tr.y); ctx.scale(tr.s,tr.s);

  // ── Arestas ──
  edges.forEach(e=>{
    const a=nodes.find(n=>n.id===e.source), b=nodes.find(n=>n.id===e.target);
    if(!a||!b) return;
    const hl=sel&&(sel.id===a.id||sel.id===b.id);
    // cor da aresta
    const edgeCol  = hl ? 'rgba(200,169,110,.92)' : 'rgba(127,119,221,.38)';
    const arrowCol = hl ? 'rgba(200,169,110,.96)' : 'rgba(127,119,221,.52)';
    const mx=(a.x+b.x)/2+(b.y-a.y)*.12, my=(a.y+b.y)/2-(b.x-a.x)*.12;

    // linha — mais espessa
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y);
    ctx.strokeStyle=edgeCol;
    ctx.lineWidth=hl?4:2.2;   // ← espessura aumentada
    ctx.stroke();

    // seta — maior
    const t=.66;
    const px=qp(a.x,mx,b.x,t), py=qp(a.y,my,b.y,t);
    const ang=Math.atan2(qd(a.y,my,b.y,t), qd(a.x,mx,b.x,t));
    drawArrow(px,py,ang, hl?16:11, arrowCol); // ← seta maior

    // rótulo da aresta com fundo
    if(e.label){
      const lx=(a.x+b.x)/2+(b.y-a.y)*.06;
      const ly=(a.y+b.y)/2-(b.x-a.x)*.06-10;
      const font=`${hl?'500':'400'} 10px monospace`;
      const tc  = hl ? 'rgba(200,169,110,1)' : 'rgba(200,190,160,.88)';
      const bgc = hl ? 'rgba(40,34,20,.88)'  : 'rgba(20,20,26,.78)';
      ctx.textAlign='center';
      fillTextBg(e.label, lx, ly, font, tc, bgc, 4, 2);
    }
  });

  // ── Nós ──
  nodes.forEach(n=>{
    const isSel=sel&&sel.id===n.id, isHov=hov&&hov.id===n.id;
    const col=COLORS[n.type]||'#888', r=n.rad;

    // halo
    if(isSel){
      ctx.save(); ctx.shadowColor=col+'70'; ctx.shadowBlur=28;
      ctx.beginPath(); ctx.arc(n.x,n.y,r+4,0,Math.PI*2); ctx.fillStyle=col+'28'; ctx.fill();
      ctx.restore();
    } else if(isHov){
      ctx.beginPath(); ctx.arc(n.x,n.y,r+4,0,Math.PI*2); ctx.fillStyle=col+'18'; ctx.fill();
    }

    // círculo com gradiente
    ctx.save(); ctx.shadowColor=col+'50'; ctx.shadowBlur=isSel?22:10;
    const g=ctx.createRadialGradient(n.x-r*.28,n.y-r*.28,r*.08,n.x,n.y,r);
    g.addColorStop(0, col+(isSel?'ff':'ee'));
    g.addColorStop(1, col+(isSel?'cc':'88'));
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.restore();

    // borda
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.strokeStyle=isSel?'rgba(255,255,255,.72)':'rgba(255,255,255,.22)';
    ctx.lineWidth=isSel?2.2:1.2; ctx.stroke();

    // texto dentro do círculo
    // fundo do texto: recorte circular limpo antes de escrever
    // (a cor do círculo já é o fundo — não precisamos de mais nada)
    ctx.fillStyle='rgba(255,255,255,.97)';
    ctx.textAlign='center';
    const fs=r>=38?12:r>=30?11:10;
    ctx.font=`600 ${fs}px monospace`;
    const lines=wrapText(n.label, r*1.62);
    const lh=fs+3, tot=(lines.length-1)*lh;
    lines.forEach((l,i)=>ctx.fillText(l, n.x, n.y - tot/2 + i*lh + 4.5));
  });

  ctx.restore();
}

// ── Interação ──
function toW(e){const r=gc.getBoundingClientRect(); return{x:(e.clientX-r.left-tr.x)/tr.s, y:(e.clientY-r.top-tr.y)/tr.s}}
function hit(pt){return nodes.find(n=>Math.hypot(n.x-pt.x,n.y-pt.y)<n.rad+6)||null}

function setupEvents(){
  gc.onmousedown=e=>{const pt=toW(e),n=hit(pt); if(n){drag=n;dOff={x:pt.x-n.x,y:pt.y-n.y};}else{pan={x:e.clientX,y:e.clientY};panO={x:tr.x,y:tr.y};}};
  gc.onmousemove=e=>{
    const pt=toW(e);
    if(drag){drag.x=pt.x-dOff.x; drag.y=pt.y-dOff.y; draw(); return;}
    if(pan){tr.x=panO.x+(e.clientX-pan.x); tr.y=panO.y+(e.clientY-pan.y); draw(); return;}
    const n=hit(pt); if(n!==hov){hov=n;draw();}
    const tip=document.getElementById('tip');
    if(n){
      const r=gc.getBoundingClientRect();
      const sx=n.x*tr.s+tr.x, sy=n.y*tr.s+tr.y;
      tip.style.display='block';
      tip.style.left=Math.min(sx+n.rad*tr.s+12, r.width-262)+'px';
      tip.style.top =Math.max(4, sy-64)+'px';
      document.getElementById('tip-name').textContent=n.label;
      document.getElementById('tip-name').style.color=COLORS[n.type]||'#fff';
      document.getElementById('tip-type').textContent=LABELS[n.type]||n.type;
      document.getElementById('tip-desc').textContent=n.description||'';
      gc.style.cursor='pointer';
    } else {tip.style.display='none'; gc.style.cursor='default';}
  };
  gc.onmouseup=e=>{
    if(!pan&&!drag){const pt=toW(e),n=hit(pt); if(n)selectNode(n); else{sel=null;document.getElementById('detail').style.display='none';draw();}}
    drag=null; pan=null;
  };
  gc.onmouseleave=()=>{drag=null;pan=null;document.getElementById('tip').style.display='none';hov=null;draw();};
  gc.onwheel=e=>{e.preventDefault(); tr.s=Math.max(.2,Math.min(5,tr.s*(e.deltaY<0?1.13:.89))); draw();};
  // touch
  let lt=null;
  gc.addEventListener('touchstart',e=>{if(e.touches.length===1){const t=e.touches[0],r=gc.getBoundingClientRect(),pt={x:(t.clientX-r.left-tr.x)/tr.s,y:(t.clientY-r.top-tr.y)/tr.s},n=hit(pt);if(n){drag=n;dOff={x:pt.x-n.x,y:pt.y-n.y};}else{pan={x:t.clientX,y:t.clientY};panO={x:tr.x,y:tr.y};}lt={x:t.clientX,y:t.clientY};}},{passive:true});
  gc.addEventListener('touchmove',e=>{if(e.touches.length===1){const t=e.touches[0],r=gc.getBoundingClientRect();if(drag){const pt={x:(t.clientX-r.left-tr.x)/tr.s,y:(t.clientY-r.top-tr.y)/tr.s};drag.x=pt.x-dOff.x;drag.y=pt.y-dOff.y;draw();}else if(pan){tr.x=panO.x+(t.clientX-pan.x);tr.y=panO.y+(t.clientY-pan.y);draw();}}},{passive:true});
  gc.addEventListener('touchend',e=>{if(lt){const t=e.changedTouches[0];if(Math.hypot(t.clientX-lt.x,t.clientY-lt.y)<8&&!drag){const r=gc.getBoundingClientRect(),pt={x:(t.clientX-r.left-tr.x)/tr.s,y:(t.clientY-r.top-tr.y)/tr.s},n=hit(pt);if(n)selectNode(n);}}drag=null;pan=null;lt=null;},{passive:true});
}

function selectNode(n){
  sel=n; draw();
  const out=edges.filter(e=>e.source===n.id).map(e=>{const o=nodes.find(nd=>nd.id===e.target);return o?`<div style="font-size:12px;margin-bottom:4px"><span style="color:${COLORS[o.type]}">●</span> <em style="color:#666">${e.label}</em> → <strong>${o.label}</strong></div>`:''}).filter(Boolean);
  const inn=edges.filter(e=>e.target===n.id).map(e=>{const o=nodes.find(nd=>nd.id===e.source);return o?`<div style="font-size:12px;margin-bottom:4px"><span style="color:${COLORS[o.type]}">●</span> <strong>${o.label}</strong> → <em style="color:#666">${e.label}</em></div>`:''}).filter(Boolean);
  const det=document.getElementById('detail');
  det.style.display='block';
  det.innerHTML=`
    <div style="font-weight:600;font-size:14px;color:${COLORS[n.type]};margin-bottom:4px">${n.label}</div>
    <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:8px">${LABELS[n.type]||n.type}</div>
    <div style="margin-bottom:10px;color:#aaa;font-size:12.5px;line-height:1.7">${n.description}</div>
    ${inn.length?'<div style="margin-bottom:4px">'+inn.join('')+'</div>':''}
    ${out.length?'<div>'+out.join('')+'</div>':''}
  `;
}

function zoomG(f){tr.s=Math.max(.2,Math.min(5,tr.s*f));draw();}
function resetView(){tr={x:0,y:0,s:1};sel=null;document.getElementById('detail').style.display='none';draw();}
window.zoomG=zoomG; window.resetView=resetView;

window.addEventListener('resize',()=>{initCanvas();if(nodes.length)draw();});
buildGraph();
</script>
